services:
  database:
    image: mysql:8.4
    container_name: hotel_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hotel_booking_db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    ports:
      - "3307:3306"
    volumes:
      - hotel_mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: hotel_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      FRONTEND_URL: http://localhost:5714
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: hotel_booking_db
      DB_USER: root
      DB_PASSWORD: 123456
      JWT_SECRET: staynest_jwt_dev_secret_2026
      JWT_EXPIRES_IN: 7d
      INVOICE_DIR: storage/invoices
    ports:
      - "5000:5000"
    volumes:
      - hotel_backend_storage:/app/storage
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_VIETQR_BANK_ID: "970407"
        VITE_VIETQR_ACCOUNT_NO: "722710020058888"
        VITE_VIETQR_ACCOUNT_NAME: "NGUYEN XUAN DIEU"
        VITE_VIETQR_TEMPLATE: compact2
    container_name: hotel_frontend
    restart: unless-stopped
    ports:
      - "5714:80"
    depends_on:
      - backend

volumes:
  hotel_mysql_data:
  hotel_backend_storage:
